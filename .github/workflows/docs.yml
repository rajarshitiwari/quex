name: Deploy JupyterBook

on:
  push:
    branches:
      - main  # Change to 'master' if that is your default branch

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-book:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Install uv and set up caching automatically
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # 2. Set up Python (uv makes this practically instantaneous)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version" # Or hardcode like "3.11"

      # 3. Sync the environment specifically with the docs group
      - name: Install dependencies
        run: |
          uv sync --group docs

      # 4. Build the JupyterBook using the uv-managed environment
      - name: Build the book
        run: |
          uv run jupyter-book build docs/

      # 5. Upload the HTML build as an artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs/_build/html"

      # 6. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4