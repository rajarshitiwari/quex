name: Publish to PyPI

on:
  release:
    types: [published]  # Triggers ONLY when you release

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # This environment connects to PyPI's Trusted Publishing
    environment:
      name: pypi
      url: https://pypi.org/p/quex  # Change this if your PyPI name is different!
      
    # MANDATORY: This permission allows GitHub to request an OIDC token from PyPI
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package distributions
        run: uv build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
