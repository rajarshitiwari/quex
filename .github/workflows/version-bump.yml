name: Auto Version Bump

on:
  push:
    branches:
      - main  # Only bump when code reaches the main branch

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the action to push changes back
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Get all history

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
            enable-cache: true
            cache-dependency-glob: "uv.lock"
        
      - name: Install dependencies
        run: |
            uv sync --dev
        
      - name: Bump version in pyproject.toml
        run: uv run python scripts/bump-version.py # We use your logic here