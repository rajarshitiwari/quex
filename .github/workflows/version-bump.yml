name: Auto Release & Version Bump

on:
  push:
    branches:
      - main  # Only bump when code reaches the main branch

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the action to push changes back
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history (Crucial for the changelog generator)

      # --- 1. CHANGELOG GENERATION ---
      - name: Generate Cumulative Changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit Changelog Locally
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md
          # Commit the file locally. We DO NOT push yet.
          git commit -m "docs: auto-update cumulative changelog" || echo "No changes to commit"

      # --- 2. UV SETUP ---
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
            enable-cache: true
            cache-dependency-glob: "uv.lock"
        
      - name: Install dependencies
        run: |
            uv sync --dev
        
      # --- 3. VERSION BUMP & PUSH ---
      - name: Bump version in pyproject.toml and Push All
        # This script modifies pyproject.toml, commits it with [skip ci], 
        # and pushes BOTH the changelog commit and the version bump commit to main.
        run: uv run python scripts/bump-version.py