name: Auto Release & Version Bump

on:
  push:
    branches:
      - main  # Only bump when code reaches the main branch

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the action to push changes back
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history

      # --- 1. SETUP UV FIRST ---
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
            enable-cache: true
            cache-dependency-glob: "uv.lock"

      # --- 2. CHANGELOG GENERATION (The uvx way!) ---
      - name: Generate Cumulative Changelog
        # Downloads git-cliff in milliseconds and runs it natively
        run: uvx git-cliff --config cliff.toml --output CHANGELOG.md

      - name: Commit Changelog Locally
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md
          # Commit the file locally. We DO NOT push yet.
          git commit -m "docs: auto-update cumulative changelog" || echo "No changes to commit"

      # --- 3. VERSION BUMP & PUSH ---
      - name: Install dependencies
        run: |
            uv sync --dev
        
      - name: Bump version in pyproject.toml and Push All
        # This script modifies pyproject.toml, commits it with [skip ci], 
        # and pushes BOTH commits to main simultaneously.
        run: uv run python scripts/bump-version.py